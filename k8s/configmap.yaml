apiVersion: v1
kind: ConfigMap
metadata:
  name: shop-demo-config
  namespace: shop-demo
data:
  JWT_EXPIRE_MINUTES: "60"
  UVICORN_WORKERS: "4"
  # 4 pods × 4 workers × (5+8) = 208 max DB conns — must stay below Postgres max_connections.
  DB_POOL_SIZE: "5"
  DB_MAX_OVERFLOW: "8"
  DB_POOL_TIMEOUT: "5"
  DB_POOL_RECYCLE: "1800"
